name: Windows release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest
    steps:
      - name: Получить исходный код
        uses: actions/checkout@v4

      - name: Подключить Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Установить зависимости
        run: npm ci

      - name: Проверить проект
        run: npm run check

      - name: Собрать и опубликовать Windows-релиз
        run: npx electron-builder --win nsis portable --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
