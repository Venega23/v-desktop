<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'unsafe-inline'">
  <title>Слой · встреча</title>
  <style>
    *{box-sizing:border-box}html,body{width:100%;height:100%;margin:0;overflow:hidden;background:transparent;font-family:Inter,"Segoe UI",sans-serif;color:#eef1f6}body{padding:10px}
    main{height:100%;display:flex;flex-direction:column;overflow:hidden;border:1px solid rgba(255,255,255,.16);border-radius:22px;background:rgba(18,22,31,.97);box-shadow:0 24px 75px rgba(0,0,0,.46);backdrop-filter:blur(28px)}
    header{display:flex;align-items:center;gap:10px;padding:14px 14px 10px 18px;-webkit-app-region:drag}header i{width:9px;height:9px;border-radius:50%;background:#ef6f72;box-shadow:0 0 0 5px rgba(239,111,114,.1)}header div{min-width:0}header strong,header small{display:block;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}header strong{font-size:14px}header small{margin-top:3px;color:#8d98a6;font-size:10px}.window-actions{margin-left:auto;display:flex;gap:4px;-webkit-app-region:no-drag}.window-actions button{width:30px;height:30px;padding:0;font-size:16px}
    button{border:0;border-radius:9px;color:#c7cbd2;background:rgba(255,255,255,.07);cursor:pointer;font:inherit}.controls{display:flex;flex-wrap:wrap;gap:6px;padding:0 16px 10px}.controls button{padding:8px 11px;font-size:10px}.controls .primary{color:#fff;background:#6d63e8}.controls .danger{color:#f4a1a3;background:rgba(239,111,114,.12)}
    nav{display:flex;gap:3px;margin:0 14px;padding:4px;border-radius:11px;background:rgba(255,255,255,.055)}nav button{flex:1;padding:8px 5px;color:#8d98a6;background:transparent;font-size:10px}nav button.active{color:#f2f3f7;background:rgba(255,255,255,.1)}
    #progress{display:none;margin:10px 16px 0;padding:10px 12px;border-radius:11px;color:#aaa4ff;background:rgba(109,99,232,.09);font-size:11px}#progress.visible{display:block}
    #content{flex:1;min-height:0;overflow:auto;padding:14px 17px 18px;cursor:text;user-select:text;-webkit-user-select:text}.empty{color:#8792a0;font-size:12px}.hero,.suggestion,.section{margin-bottom:11px;padding:12px 13px;border:1px solid rgba(255,255,255,.09);border-radius:13px;background:rgba(255,255,255,.04)}.hero small,.suggestion small,h3{display:block;margin:0 0 7px;color:#aaa4ff;font-size:9px;letter-spacing:.08em;text-transform:uppercase}.hero p,.suggestion p{margin:0;white-space:pre-wrap;font-size:14px;line-height:1.55}.section h3{color:#8d98a6}.section ol,.section ul{display:grid;gap:7px;margin:0;padding-left:20px}.section li{font-size:12px;line-height:1.48}.topic{display:grid;gap:2px}.topic span{color:#929dab}.transcript{white-space:pre-wrap;color:#d9dde4;font-size:12px;line-height:1.55}
    ::-webkit-scrollbar{width:7px}::-webkit-scrollbar-thumb{border-radius:10px;background:rgba(255,255,255,.13)}
  </style>
</head>
<body>
  <main>
    <header><i></i><div><strong id="title">Текущая встреча</strong><small id="state">Подключаюсь…</small></div><div class="window-actions"><button id="minimize" title="Свернуть">−</button><button id="close" title="Скрыть">×</button></div></header>
    <div class="controls"><button class="primary" id="pause">Пауза</button><button class="danger" id="finish">Завершить встречу</button><button id="copy-content">Копировать текст</button><button id="open-main">Открыть основную программу</button></div>
    <nav><button class="active" data-tab="now">Сейчас</button><button data-tab="summary">Конспект</button><button data-tab="important">Самое важное</button><button data-tab="cheats">Шпаргалки</button><button data-tab="transcript">Расшифровка</button></nav>
    <div id="progress"></div><section id="content"><p class="empty">Ожидаю первые реплики…</p></section>
  </main>
  <script src="meeting.js"></script>
</body>
</html>
