<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'unsafe-inline'">
  <title>Слой · ответ</title>
  <style>
    *{box-sizing:border-box}html,body{width:100%;height:100%;margin:0;overflow:hidden;background:transparent;font-family:Inter,"Segoe UI",sans-serif;color:#eef1f6}
    body{padding:10px;opacity:0;transform:translateY(10px) scale(.98);transition:160ms ease}body.ready{opacity:1;transform:none}
    main{height:100%;display:flex;flex-direction:column;overflow:hidden;border:1px solid rgba(255,255,255,.16);border-radius:20px;background:rgba(19,23,33,.96);box-shadow:0 22px 65px rgba(0,0,0,.42);backdrop-filter:blur(26px)}
    header{display:flex;align-items:center;gap:8px;padding:12px 12px 8px 15px;-webkit-app-region:drag}header i{width:8px;height:8px;border-radius:50%;background:#7dd3a7;box-shadow:0 0 0 5px rgba(125,211,167,.1)}header strong{font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:#aaa4ff}header span{margin-left:auto;font-size:10px;color:#7f8a98}button{-webkit-app-region:no-drag;border:0;cursor:pointer}
    #close{width:28px;height:28px;border-radius:9px;color:#9da6b2;background:rgba(255,255,255,.07);font-size:17px}
    section{flex:1;min-height:0;overflow:auto;padding:4px 15px 12px}.question{margin:0 0 9px;color:#929dab;font-size:11px;line-height:1.4}.answer{margin:0;white-space:pre-wrap;color:#f3f5f8;font-size:15px;line-height:1.58}
    footer{display:flex;justify-content:flex-end;gap:7px;padding:9px 12px 12px;border-top:1px solid rgba(255,255,255,.08)}footer button{padding:8px 11px;border-radius:10px;font-size:11px;font-weight:700}#pause{margin-right:auto;color:#d9d6ff;background:rgba(109,99,232,.18)}#pause.active{color:#10131a;background:#f4c95d}#open{color:#fff;background:#6d63e8}
    ::-webkit-scrollbar{width:7px}::-webkit-scrollbar-thumb{border-radius:10px;background:rgba(255,255,255,.13)}
  </style>
</head>
<body>
  <main>
    <header title="Перетащите окно в удобное место"><i></i><strong>Слой · варианты ответа</strong><span>можно перемещать</span><button id="close" aria-label="Скрыть">×</button></header>
    <section><p class="question" id="question"></p><p class="answer" id="answer">Готовлю ответ…</p></section>
    <footer><button id="pause" type="button" aria-pressed="false">Заморозить · Caps Lock</button><button id="open">Открыть Слой</button></footer>
  </main>
  <script src="answer.js"></script>
</body>
</html>
